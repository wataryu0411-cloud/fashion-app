<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ファッション提案システム</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #f4f4f5, #e5e7eb);
      color: #111827;
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    header {
      background: #111827;
      color: white;
      padding: 32px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    header p {
      color: #d1d5db;
      font-size: 15px;
      line-height: 1.7;
    }

    main {
      padding: 32px;
    }

    .section {
      margin-bottom: 28px;
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #fafafa;
    }

    .section h2 {
      font-size: 20px;
      margin-bottom: 16px;
      border-left: 6px solid #111827;
      padding-left: 10px;
    }

    .question {
      margin-bottom: 22px;
    }

    .question label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    select,
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      background: white;
    }

    .scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .scale input {
      display: none;
    }

    .scale label {
      text-align: center;
      padding: 10px 4px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: normal;
      transition: 0.2s;
    }

    .scale input:checked + label {
      background: #111827;
      color: white;
      border-color: #111827;
      transform: translateY(-2px);
    }

    .note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .result {
      display: none;
      margin-top: 32px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .result-image {
      width: 100%;
      height: 360px;
      object-fit: cover;
      background: #e5e7eb;
    }

    .result-content {
      padding: 28px;
    }

    .result-content h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      background: #111827;
      color: white;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .items {
      margin: 16px 0;
      padding-left: 20px;
      line-height: 1.9;
    }

    .reason {
      background: #f3f4f6;
      border-radius: 14px;
      padding: 16px;
      line-height: 1.8;
      margin-top: 16px;
    }

    .shop-link {
      display: inline-block;
      margin-top: 18px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: bold;
    }

    .error {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 14px;
      border-radius: 12px;
      margin-top: 16px;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 13px;
    }

    .result-image {
      height: 250px;
    }

    .step {
      display: none;
      opacity: 0;
      transform: translateY(12px);
    }

    .step.active {
      display: block;
      animation: fadeInStep 0.35s ease forwards;
    }

    @keyframes fadeInStep {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .choice-buttons {
      display: grid;
      gap: 12px;
    }

    .choice-button {
      width: 100%;
      padding: 16px;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: white;
      color: #111827;
      text-align: left;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    } 

    .choice-button:hover {
      border-color: #111827;
      background: #f3f4f6;
    }

    .choice-button.selected {
      background: #111827;
      color: white;
      border-color: #111827;
    }
    .circle-choice-area {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 28px 24px;
      justify-items: center;
      align-items: center;
      margin-top: 24px;
    }

    .circle-choice-area .circle-button:nth-child(1) {
      grid-column: 1 / span 2;
    }

    .circle-choice-area .circle-button:nth-child(2) {
      grid-column: 3 / span 2;
    }

    .circle-choice-area .circle-button:nth-child(3) {
      grid-column: 5 / span 2;
    }

    .circle-choice-area .circle-button:nth-child(4) {
      grid-column: 2 / span 2;
    }

    .circle-choice-area .circle-button:nth-child(5) {
      grid-column: 4 / span 2;
    }

    .circle-button {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #8b4513;
      background: #f4b183;
      color: #3b1f0f;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(139, 69, 19, 0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .circle-button:hover {
      background: #f7c59f;
      transform: translateY(-6px);
      box-shadow: 0 16px 28px rgba(139, 69, 19, 0.28);
    }

    .circle-button:active {
      transform: scale(0.92);
      box-shadow: 0 4px 10px rgba(139, 69, 19, 0.25);
    }

    .circle-button.selected {
      background: #e07a3f;
      color: white;
      transform: scale(1.08);
    }

    .circle-button.pop {
      animation: popTouch 0.35s ease;
    }

    @keyframes popTouch {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.12);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 640px) {
      .circle-choice-area {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .circle-button {
        width: 135px;
        height: 135px;
        font-size: 16px;
      }
    }

    .step-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      main {
        padding: 20px;
      }

      header {
        padding: 24px;
      }

      
    }
    #rakutenItems{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.item-card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    text-align:center;
    background:#fff;
}

.item-card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.item-card a{
    display:inline-block;
    margin-top:10px;
    padding:8px 16px;
    background:#bf0000;
    color:#fff;
    text-decoration:none;
    border-radius:20px;
}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>ファッション提案システム</h1>
      <p>
        体格・顔や髪の特徴・好みに関する質問に答えると、<br />
        条件分岐とスコア計算によりおすすめの服装を提示します。
      </p>
    </header>

    <main>
      <form id="fashionForm">
        <!-- 1. 目的 -->
        <section class="section step active" id="step1">
          <h2>1. 行く場所・目的</h2>

          <div class="circle-choice-area">
            <button type="button" class="circle-button" onclick="selectScene('school', this)">学校</button>
            <button type="button" class="circle-button" onclick="selectScene('shopping', this)">買い物</button>
            <button type="button" class="circle-button" onclick="selectScene('date', this)">デート</button>
          <button type="button" class="circle-button" onclick="selectScene('friend', this)">友達と遊ぶ</button>
          <button type="button" class="circle-button" onclick="selectScene('formal', this)">きれいめな場所</button>
          </div>

          <input type="hidden" id="scene" required />
        </section>

        <!-- 2. 性別 -->
        <section class="section step" id="step2">
          <h2>2. 性別</h2>

          <div class="choice-buttons">
            <button type="button" class="choice-button" onclick="selectGender('male', this)">○ 男性</button>
            <button type="button" class="choice-button" onclick="selectGender('female', this)">○ 女性</button>
          </div>

          <input type="hidden" id="gender" required />

          <div class="step-buttons">
            <button type="button" class="secondary" onclick="prevStep()">戻る</button>
          </div>
        </section>

        <!-- 3. 身長・体重・体型 -->
        <section class="section step" id="step3">
          <h2>3. 身長・体重・体型</h2>

          <div class="question">
            <label for="heightCm">身長</label>
            <input id="heightCm" type="number" min="1" step="1" placeholder="例：178" required />
            <p class="note">cm単位で入力してください。例：178</p>
          </div>

          <div class="question">
            <label for="weightKg">体重</label>
            <input id="weightKg" type="number" min="1" step="1" placeholder="例：70" />
            <p class="note">任意入力です。kg単位で入力してください。</p>
          </div>

          <div class="question">
            <label for="bodyType">体型</label>
            <select id="bodyType" required>
              <option value="">選択してください</option>
              <option value="slim">細め</option>
              <option value="normal">標準</option>
              <option value="strong">がっしり</option>
            </select>
          </div>

          <div class="step-buttons">
            <button type="button" class="secondary" onclick="prevStep()">戻る</button>
            <button type="button" class="primary" onclick="nextStep()">次へ</button>
            </div>
        </section>

        <!-- 4. 顔・髪の特徴 -->
        <section class="section step" id="step4">
          <h2>4. 顔・髪の特徴</h2>

          <div class="question">
            <label>顔に立体感があると思いますか？</label>
            <div class="scale" data-name="faceDepth"></div>
          </div>

          <div class="question">
            <label>目や眉がはっきりしていると思いますか？</label>
            <div class="scale" data-name="eyeBrow"></div>
          </div>

          <div class="question">
            <label for="skinTone">肌の色</label>
            <select id="skinTone" required>
              <option value="">選択してください</option>
              <option value="bright">明るめ</option>
              <option value="natural">普通</option>
              <option value="deep">健康的・暗め</option>
            </select>
          </div>

          <div class="question">
            <label for="hairColor">髪の色</label>
            <select id="hairColor" required>
              <option value="">選択してください</option>
              <option value="black">黒髪</option>
              <option value="brown">茶髪</option>
              <option value="bright">明るい髪色</option>
            </select>
          </div>

          <div class="question">
            <label for="hairType">髪質</label>
            <select id="hairType" required>
              <option value="">選択してください</option>
              <option value="straight">直毛</option>
              <option value="wavy">くせ毛・ウェーブ</option>
              <option value="volume">ボリュームがある</option>
            </select>
          </div>

          <div class="step-buttons">
            <button type="button" class="secondary" onclick="prevStep()">戻る</button>
            <button type="button" class="primary" onclick="nextStep()">次へ</button>
          </div>
        </section>

        <!-- 5. 好み -->
        <section class="section step" id="step5">
          <h2>5. 好み</h2>

          <div class="question">
            <label>シンプルな服が好きですか？</label>
            <div class="scale" data-name="simple"></div>
          </div>

          <div class="question">
            <label>ストリート系の服が好きですか？</label>
            <div class="scale" data-name="street"></div>
          </div>

          <div class="question">
            <label>きれいめな服が好きですか？</label>
            <div class="scale" data-name="clean"></div>
          </div>

          <div class="question">
            <label>黒・白・グレーなどの落ち着いた色が好きですか？</label>
            <div class="scale" data-name="monotone"></div>
          </div>

          <div class="question">
            <label>アクセサリーをつけたいですか？</label>
            <div class="scale" data-name="accessory"></div>
          </div>

          <div class="step-buttons">
            <button type="button" class="secondary" onclick="prevStep()">戻る</button>
            <button type="submit" class="primary">診断する</button>
          </div>
        </section>

        <div id="error" class="error"></div>
      </form>

      <section id="step6" class="section step result">
        <img id="resultImage" class="result-image" src="" alt="おすすめ服装の画像" />
        <div class="result-content">
          <span id="resultTag" class="tag"></span>
          <h2 id="resultTitle"></h2>
          <p id="resultSummary"></p>

          <ul id="resultItems" class="items"></ul>

          <div class="reason">
            <strong>提案理由</strong>
            <p id="resultReason"></p>
          </div>

          <a id="shopLink" class="shop-link" href="#" target="_blank" rel="noopener noreferrer">
            商品を検索する
          </a>
          <div id="rakutenItems"></div>
          <div class="step-buttons">
            <button type="button" class="secondary" onclick="prevStep()">戻る</button>
            <button type="button" class="primary" onclick="resetForm()">最初からやり直す</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      課題研究用サンプルプログラム / 選択式質疑応答によるファッション提案
    </footer>
  </div>

  <script>
    // 5段階評価ボタンを自動生成する
    const scaleTexts = [
      "1\nそう思わない",
      "2",
      "3\nどちらでもない",
      "4",
      "5\nそう思う"
    ];

    let currentStep = 1;
    const maxStep = 6;

    function showStep(stepNumber) {
      document.querySelectorAll(".step").forEach((step) => {
        step.classList.remove("active");
      });

      document.getElementById(`step${stepNumber}`).classList.add("active");
      currentStep = stepNumber;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function nextStep() {
      if (!validateCurrentStep()) {
        return;
      }

      if (currentStep < maxStep) {
        hideError();
        showStep(currentStep + 1);
      }
    }

    function validateCurrentStep() {
      hideError();

      if (currentStep === 1) {
        const scene = document.getElementById("scene").value;

        if (!scene) {
          showError("行く場所・目的を選択してください。");
          return false;
        }
      }

      if (currentStep === 2) {
        const gender = document.getElementById("gender").value;

        if (!gender) {
          showError("性別を選択してください。");
          return false;
        }
      }

      if (currentStep === 3) {
        const heightCm = Number(document.getElementById("heightCm").value);
        const weightValue = document.getElementById("weightKg").value;
        const weightKg = Number(weightValue);
        const bodyType = document.getElementById("bodyType").value;

        if (!Number.isInteger(heightCm) || heightCm <= 0) {
          showError("身長は自然数で入力してください。例：178");
          return false;
        }
      // 体重は任意。入力されている場合だけ自然数チェックする
        if (weightValue !== "" && (!Number.isInteger(weightKg) || weightKg <= 0)) {
          showError("体重は自然数で入力してください。例：70");
          return false;
        }

        if (!bodyType) {
          showError("体型を選択してください。");
          return false;
        }
      }

      if (currentStep === 4) {
        const faceDepth = getRadioValue("faceDepth");
        const eyeBrow = getRadioValue("eyeBrow");
        const skinTone = document.getElementById("skinTone").value;
        const hairColor = document.getElementById("hairColor").value;
        const hairType = document.getElementById("hairType").value;

        if (!faceDepth || !eyeBrow || !skinTone || !hairColor || !hairType) {
          showError("顔・髪の特徴をすべて回答してください。");
          return false;
        }
      }

      if (currentStep === 5) {
        const simple = getRadioValue("simple");
        const street = getRadioValue("street");
        const clean = getRadioValue("clean");
        const monotone = getRadioValue("monotone");
        const accessory = getRadioValue("accessory");

        if (!simple || !street || !clean || !monotone || !accessory) {
          showError("好みの質問をすべて回答してください。");
          return false;
        }
      }

      return true;
    }

    function prevStep() {
      if (currentStep > 1) {
        showStep(currentStep - 1);
      }
    }


    function selectScene(value, button) {
      document.getElementById("scene").value = value;

      document.querySelectorAll("#step1 .circle-button").forEach((btn) => {
        btn.classList.remove("selected");
        btn.classList.remove("pop");
      });

      button.classList.add("selected");
      button.classList.add("pop");

      setTimeout(() => {
        nextStep();
      }, 350);
    }

    function selectGender(value, button) {
      document.getElementById("gender").value = value;

      document.querySelectorAll("#step2 .choice-button").forEach((btn) => {
        btn.classList.remove("selected");
      });

      button.classList.add("selected");

      setTimeout(() => {
        nextStep();
      }, 200);
    }

    document.querySelectorAll(".scale").forEach((scaleBox) => {
      const name = scaleBox.dataset.name;

      for (let i = 1; i <= 5; i++) {
        const input = document.createElement("input");
        input.type = "radio";
        input.name = name;
        input.id = `${name}${i}`;
        input.value = i;
        input.required = true;

        const label = document.createElement("label");
        label.htmlFor = `${name}${i}`;
        label.innerText = scaleTexts[i - 1];

        scaleBox.appendChild(input);
        scaleBox.appendChild(label);
      }
    });

    const outfits = {
      male: {
        street: {
          tag: "男性向けストリート系",
          title: "オーバーサイズストリートコーデ",
          summary: "動きやすさと個性を重視した男性向けの服装です。",
          items: [
            "オーバーサイズTシャツまたはパーカー",
            "ワイドパンツまたはカーゴパンツ",
            "スニーカー",
            "キャップまたはシルバーアクセサリー"
          ],
          image: "画像URL",
          keyword: "メンズ ストリート オーバーサイズ ワイドパンツ"
        },
        clean: {
          tag: "男性向けきれいめ系",
          title: "シンプルきれいめコーデ",
          summary: "清潔感を重視した男性向けの服装です。",
          items: [
            "無地トップス",
            "スラックス",
            "革靴風スニーカー",
            "腕時計"
          ],
      image: "画像URL",
      keyword: "メンズ きれいめ スラックス"
    }
  },

  female: {
    street: {
      tag: "女性向けストリート系",
      title: "オーバーサイズストリートコーデ",
      summary: "ゆるめのシルエットを取り入れた女性向けの服装です。",
      items: [
        "オーバーサイズTシャツまたはスウェット",
        "ワイドパンツまたはカーゴスカート",
        "厚底スニーカー",
        "キャップやアクセサリー"
      ],
      image: "画像URL",
      keyword: "レディース ストリート オーバーサイズ コーデ"
    },

    clean: {
      tag: "女性向けきれいめ系",
      title: "シンプルきれいめコーデ",
      summary: "清潔感と上品さを重視した女性向けの服装です。",
      items: [
        "ブラウスまたはきれいめトップス",
        "スラックスまたはロングスカート",
        "パンプスまたはきれいめスニーカー",
        "小さめのアクセサリー"
      ],
      image: "画像URL",
      keyword: "レディース きれいめ シンプル コーデ"
    }
  }
};

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? Number(checked.value) : null;
    }

    function showError(message) {
      const error = document.getElementById("error");
      error.textContent = message;
      error.style.display = "block";
    }

    function hideError() {
      const error = document.getElementById("error");
      error.textContent = "";
      error.style.display = "none";
    }

    document.getElementById("fashionForm").addEventListener("submit", function (event) {
      event.preventDefault();
      hideError();

      const scene = document.getElementById("scene").value;
      const bodyType = document.getElementById("bodyType").value;
      const skinTone = document.getElementById("skinTone").value;
      const hairColor = document.getElementById("hairColor").value;
      const hairType = document.getElementById("hairType").value;
      const gender = document.getElementById("gender").value;

      const heightCm = Number(document.getElementById("heightCm").value);
      const weightKg = Number(document.getElementById("weightKg").value);
      const size = getSizeCategory(gender, heightCm, weightKg, bodyType)
      
      const faceDepth = getRadioValue("faceDepth");
      const eyeBrow = getRadioValue("eyeBrow");
      const simple = getRadioValue("simple");
      const street = getRadioValue("street");
      const clean = getRadioValue("clean");
      const monotone = getRadioValue("monotone");
      const accessory = getRadioValue("accessory");

      function getSizeCategory(gender, heightCm, weightKg, bodyType) {
        const sizes = ["S", "M", "L", "LL"];
        let index = 1;
        
        // 身長で基本サイズを決める
        if (gender === "male") {
          if (heightCm < 165) index = 0;
          else if (heightCm < 175) index = 1;
          else if (heightCm < 185) index = 2;
          else index = 3;
        }

        if (gender === "female") {
          if (heightCm < 155) index = 0;
          else if (heightCm < 165) index = 1;
          else if (heightCm < 172) index = 2;
          else index = 3;
        }

        // 体重が入力されている場合だけBMIで補正
        if (weightKg > 0) {
          const heightM = heightCm / 100;
          const bmi = weightKg / (heightM * heightM);

          if (bmi >= 25) {
            index += 1;
          } else if (bmi < 18.5) {
            index -= 1;
          }
        }

        // 体型でも補正
        if (bodyType === "strong") {
          index += 1;
        }

        if (bodyType === "slim") {
          index -= 1;
        }

        // S未満・LL超えにならないようにする
        if (index < 0) index = 0;
        if (index > 3) index = 3;

        return sizes[index];
      }
      if (
        !scene || !gender || Number.isNaN(heightCm) || heightCm <= 0 || !bodyType || !skinTone || !hairColor || !hairType ||
        !faceDepth || !eyeBrow || !simple || !street || !clean || !monotone || !accessory 
      ) {
        showError("未回答の項目があります。質問に回答してください。");
        return;
      }


      // 好み・外見の特徴をスコア化する
      const scores = {
        street: 0,
        clean: 0,
        simple: 0,
        mode: 0,
        casual: 0
      };

      scores.street += street * 2;
      scores.clean += clean * 2;
      scores.simple += simple * 2;
      scores.mode += monotone * 1.5;
      scores.casual += 5;

      // 顔や目鼻立ちがはっきりしている場合は、黒やモード寄りが似合いやすい設定
      if (faceDepth >= 4) scores.mode += 3;
      if (eyeBrow >= 4) scores.mode += 2;

      // アクセサリーを好む場合はストリート・モードに加点
      if (accessory >= 4) {
        scores.street += 2;
        scores.mode += 2;
      }

      // 場面による補正
      if (scene === "school") {
        scores.simple += 3;
        scores.casual += 2;
      }
      if (scene === "shopping" || scene === "friend") {
        scores.street += 2;
        scores.casual += 3;
      }
      if (scene === "date" || scene === "formal") {
        scores.clean += 4;
      }

      // 体格による補正
      if (size === "L") {
        scores.street += 1;
        scores.mode += 1;
      }

      if (size === "LL") {
        scores.street += 2;
        scores.mode += 2;
      }

      if (size === "S") {
        scores.simple += 1;
        scores.clean += 1;
      }
      if (bodyType === "strong") {
        scores.street += 2;
      }
      if (bodyType === "slim") {
        scores.mode += 1;
        scores.clean += 1;
      }

      // 色・髪の特徴による補正
      if (hairColor === "black") {
        scores.mode += 2;
        scores.simple += 1;
      }
      if (hairColor === "brown" || hairColor === "bright") {
        scores.casual += 2;
      }
      if (skinTone === "bright") {
        scores.clean += 1;
        scores.simple += 1;
      }
      if (skinTone === "deep") {
        scores.street += 1;
        scores.mode += 1;
      }
      if (hairType === "volume" || hairType === "wavy") {
        scores.street += 1;
        scores.casual += 1;
      }


      const bestType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

      let reason = "回答結果をスコア化し、最も点数が高かった系統を選びました。";
      reason += ` 特に、好みの回答・行く場所・体格・髪や肌の特徴を組み合わせて判定しています。`;

      displayResult(gender, bestType, reason);
    });

      document.getElementById("resultTag").textContent = outfit.tag;
      document.getElementById("resultTitle").textContent = outfit.title;
      document.getElementById("resultSummary").textContent = outfit.summary;
      document.getElementById("resultImage").src = outfit.image;
      document.getElementById("resultImage").alt = outfit.title;
      document.getElementById("resultReason").textContent = reasonText;

      const itemList = document.getElementById("resultItems");
      itemList.innerHTML = "";
      outfit.items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        itemList.appendChild(li);
      });

     const APPLICATION_ID = "7e3526e2-439e-4d35-8522-ed6866b79fb1";
     const ACCESS_KEY = "pk_rl8IqKRQy8n4zmZ0IKErGkDIipM3fGDzvs9suIKhKMb";

     const shopLink = document.getElementById("shopLink");
     shopLink.style.display = "none";

     const area = document.getElementById("rakutenItems");
     area.innerHTML = "<p>楽天市場の商品を検索中...</p>";

    const url =
    `https://app.rakuten.co.jp/services/api/IchibaItem/Search/20220601?applicationId=${APPLICATION_ID}&keyword=${encodeURIComponent(outfit.keyword)}&hits=4`;

     fetch(url)
.then(res => res.json())
.then(data => {

    area.innerHTML = "";

    if (!data.items || data.items.length === 0) {
        area.innerHTML = "<p>商品が見つかりませんでした。</p>";

            <a href="${item.itemUrl}" target="_blank">
                楽天市場で見る
            </a>

        `;

    });

})
.catch(error => {

});
    }

    function resetForm() {
      document.getElementById("fashionForm").reset();
      hideError();

      document.querySelectorAll(".choice-button, .circle-button").forEach((btn) => {
        btn.classList.remove("selected");
        btn.classList.remove("pop");
      });

      showStep(1);
    }
    // 身長でEnterを押したら体重欄へ移動
    document.getElementById("heightCm").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("weightKg").focus();
      }
    });

    // 体重でEnterを押したら体型欄へ移動
    document.getElementById("weightKg").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("bodyType").focus();
      }
    });

    let bodyTypeEnterReady = false;

    document.getElementById("bodyType").addEventListener("change", function () {
      bodyTypeEnterReady = false;
    });

    document.getElementById("bodyType").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();

        const bodyType = document.getElementById("bodyType").value;

        if (!bodyType) {
          showError("体型を選択してください。");
          return;
        }

      // 1回目のEnter：選択を決定した扱い
        if (!bodyTypeEnterReady) {
          hideError();
          bodyTypeEnterReady = true;
          showError("もう一度Enterを押すと次へ進みます。");
          return;
        }

        // 2回目のEnter：次へ進む
        hideError();
        bodyTypeEnterReady = false;
        nextStep();
      }
    });

  </script>
